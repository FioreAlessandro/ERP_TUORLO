<!DOCTYPE html>
<html>
<head>
<title>Lista Consegne</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
    Lista Consegne Giornaliera
</div>

<div class="container">

    <div id="lista"></div>

    <br>
    <button onclick="fineGiornata()">FINE GIORNATA</button>

</div>

<script>

function carica(){
 fetch("/api/lista")
 .then(r=>r.json())
 .then(data=>{
   let div = document.getElementById("lista")
   div.innerHTML = ""

   data.forEach(c=>{

     let box = document.createElement("div")

     // 🔹 CASO CONSEGNATO
     if(c.stato === "consegnato"){

        box.className = "card"
        box.style.background = "#16a34a"
        box.style.color = "white"

        box.innerHTML = `
            <h3>${c.nome}</h3>
            <p>${c.paese}</p>
            <div style="
                margin-top:10px;
                font-weight:600;
                font-size:16px;
                background:rgba(255,255,255,0.2);
                display:inline-block;
                padding:6px 14px;
                border-radius:20px;">
                ✓ CONSEGNATO
            </div>
        `

     } 
     
     // 🔹 CASO NON CONSEGNATO
     else {

        box.className = "card"

        box.innerHTML = `
            <h3>${c.nome}</h3>
            <p>${c.paese}</p>
            <span class="badge badge-warning">In Attesa</span>
            <br><br>
            <a href="/cliente/${c.telefono}">
                <button>APRI</button>
            </a>
        `
     }

     div.appendChild(box)
   })
 })
}
function fineGiornata(){

fetch("/api/mancate_consegne")

.then(r=>r.json())

.then(clienti=>{

if(clienti.length == 0){

chiudiGiornata()
return

}

apriPopup(clienti)

})

}
carica()

function apriPopup(clienti){

let html = `
<div id="popup_mancate" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
background:white;
padding:30px;
border-radius:10px;
width:400px;
max-height:80vh;
overflow:auto;
">

<h2>Mancate consegne</h2>
`

clienti.forEach(c=>{

html += `

<div style="margin-bottom:15px">

<b>${c.nome}</b><br>

<select id="motivo_${c.telefono}" style="width:100%;padding:8px">

<option value="">Seleziona motivo</option>
<option>Cliente chiuso</option>
<option>Prodotto terminato</option>
<option>Rimandato</option>
<option>Altro</option>

</select>

</div>

`

})

html += `

<button onclick="confermaMancate()" style="
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
">

Conferma Fine Giornata

</button>

</div>
</div>
`

document.body.insertAdjacentHTML("beforeend",html)

window.clienti_mancati = clienti

}

function confermaMancate(){

let mancati = []

window.clienti_mancati.forEach(c=>{

let motivo = document.getElementById("motivo_"+c.telefono).value

if(motivo == ""){
alert("Seleziona motivo per "+c.nome)
throw "stop"
}

mancati.push({
nome:c.nome,
telefono:c.telefono,
paese:c.paese,
motivo:motivo
})

})

fetch("/salva_mancate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({clienti:mancati})

})
.then(()=>{

document.getElementById("popup_mancate").remove()

chiudiGiornata()

})

}
function chiudiGiornata(){

fetch("/fine_giornata")

.then(r=>r.text())

.then(msg=>{

alert(msg)
location.reload()

})

}
</script>

</body>
</html>
