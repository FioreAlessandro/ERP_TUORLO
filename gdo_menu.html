<!DOCTYPE html>
<html>

<head>
<title>Selezione GDO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
text-align:center;
width:90%;
max-width:400px;
}

h1{
margin-bottom:40px;
}

.btn{
width:100%;
padding:18px;
margin:15px 0;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
color:white;
transition:0.2s;
}

.btn:hover{
transform:translateY(-3px);
}

.megamark{
background:#22c55e;
}

.maiora{
background:#f59e0b;
}

.lista{
background:#0f172a;
}

</style>
</head>

<body>

<div class="container">

<h1>Seleziona Cliente GDO</h1>

<button class="btn megamark" onclick="location.href='/gdo_megamark'">
DDT MEGAMARK
</button>

<button class="btn maiora" onclick="location.href='/gdo_maiora'">
DDT MAIORA
</button>

<button class="btn lista" onclick="location.href='/giri'">
LISTA DDT GDO
</button>

</div>

</body>
</html>
