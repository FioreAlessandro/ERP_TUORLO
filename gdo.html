<!DOCTYPE html>
<html>

<head>

<title>DDT GDO</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:40px;
}

.wrapper{
max-width:900px;
margin:auto;
background:#1f2937;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-bottom:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
font-weight:bold;
}

.box{
background:#111827;
padding:15px;
border-radius:8px;
margin-top:15px;
}

.pedana{
background:#020617;
padding:10px;
border-radius:6px;
margin-bottom:8px;
}

</style>

</head>

<div id="successPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">

<div style="background:#1f2937; padding:40px; border-radius:12px; text-align:center; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.6);">

<h2 style="color:#22c55e;">✔ DDT creato</h2>

<p>Email inviata al cliente</p>

<p style="margin-top:20px;">Ritorno alla home tra <b id="countdown">3</b> secondi</p>

</div>

</div>
<body>

<div class="wrapper">

<h1>Generazione DDT GDO</h1>

<label>Cliente</label>
<select id="cliente"></select>


<label>Numero pedane</label>
<input type="number" id="num_pedane" min="1" max="10">


<div id="pedane_box"></div>


<h3>Gestione Lotti - Inserisci quanti lotti diversi ci sono in questo carico</h3>

<div id="lotti_box"></div>

<button onclick="aggiungiLotto()">Aggiungi lotto</button>

<br><br>
<div class="box" id="totali_box">

<div>Totale colli pedane: <b id="tot_pedane">0</b></div>

<div>Totale colli lotti: <b id="tot_lotti">0</b></div>

<div>Colli mancanti: <b id="tot_mancanti">0</b></div>

</div>

</div>
<button onclick="genera()">Salva e Consegna</button>

</div>



<script>

let pedane=[]
let lotti=[]


// ================= CARICA CLIENTI =================

fetch("/api/clienti_gdo")
.then(res=>res.json())
.then(data=>{

let select=document.getElementById("cliente")

data.forEach(c=>{

let opt=document.createElement("option")

opt.value=c
opt.textContent=c

select.appendChild(opt)

})

})


// ================= PEDANE DINAMICHE =================

document.getElementById("num_pedane").addEventListener("input",function(){

let n=parseInt(this.value)

let box=document.getElementById("pedane_box")

box.innerHTML=""

pedane=[]

for(let i=0;i<n;i++){

box.innerHTML+=`
<div class="pedana">

Pedana ${i+1}

<input type="number" 
placeholder="Numero colli"
oninput="updatePedana(${i},this.value)">

</div>
`

}

})
function aggiornaTotali(){

let totPedane = pedane.reduce((a,b)=>a+b,0)

let totLotti = 0

lotti.forEach(l=>{
totLotti += l.colli || 0
})

document.getElementById("tot_pedane").textContent = totPedane

let elLotti = document.getElementById("tot_lotti")
elLotti.textContent = totLotti

let mancanti = totPedane - totLotti

let elMancanti = document.getElementById("tot_mancanti")

if(mancanti < 0){

elMancanti.textContent = "Superati di " + Math.abs(mancanti)
elMancanti.style.color = "#ef4444"

}
else if(mancanti == 0){

elMancanti.textContent = "0 ✓"
elMancanti.style.color = "#22c55e"

}
else{

elMancanti.textContent = mancanti
elMancanti.style.color = "#f59e0b"

}

}

function updatePedana(i,val){

pedane[i]=parseInt(val)||0
aggiornaTotali()

}


// ================= LOTTI =================

function aggiungiLotto(){

let box=document.getElementById("lotti_box")

let index=lotti.length

box.innerHTML+=`

<div class="box">

<label>Data lotto</label>

<input type="date" 
oninput="updateLottoData(${index},this.value)">

<label>Numero colli</label>

<input type="number" 
oninput="updateLottoColli(${index},this.value)">

</div>

`

lotti.push({})

}

function updateLottoData(i,val){

lotti[i].data=val
aggiornaTotali()

}

function updateLottoColli(i,val){

lotti[i].colli=parseInt(val)||0
aggiornaTotali()

}


// ================= GENERA =================

function genera(){

let cliente=document.getElementById("cliente").value
let numPedane=document.getElementById("num_pedane").value

// controllo cliente
if(!cliente){
alert("Selezionare un cliente")
return
}

// controllo numero pedane
if(!numPedane || numPedane<=0){
alert("Inserire numero pedane")
return
}

// controllo pedane compilate
for(let i=0;i<pedane.length;i++){

if(!pedane[i] || pedane[i]<=0){

alert("Inserire il numero colli per tutte le pedane")

return

}

}

// controllo lotti presenti
if(lotti.length==0){

alert("Inserire almeno un lotto")

return

}

// controllo dati lotto
for(let i=0;i<lotti.length;i++){

if(!lotti[i].data){

alert("Tutti i lotti devono avere una data")

return

}

if(!lotti[i].colli || lotti[i].colli<=0){

alert("Tutti i lotti devono avere numero colli")

return

}

}

// calcolo totali
let totale_pedane=pedane.reduce((a,b)=>a+b,0)

let totale_lotti=0

lotti.forEach(l=>{
totale_lotti+=l.colli
})

// controllo uguaglianza
if(totale_pedane!=totale_lotti){

alert("La somma dei colli dei lotti deve essere uguale ai colli delle pedane")

return

}

// invio dati
let payload={
cliente:cliente,
pedane:pedane,
lotti:lotti,
tipo : "megamark"
}

fetch("/genera_ddt_gdo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

})
.then(r=>r.json())
.then(resp=>{
window.location.href = "/giri" 
})

}

</script>

</body>

</html>
