<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="/static/app.css">

<style>

body{
background: linear-gradient(135deg, #0f172a, #1e293b);
font-family: Arial;
margin:0;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
width:420px;
background:#1f2937;
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
margin:0 0 20px 0;
text-align:center;
font-size:26px;
}

.box{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.riga{
padding:6px 0;
border-bottom:1px solid #374151;
font-size:15px;
}

.riga:last-child{
border:none;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.sub{
font-size:14px;
color:#9ca3af;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>{{ cliente }}</h1>

<div class="box">

<div class="sub">Riepilogo carico</div>

{% for p in pedane %}
<div class="riga">
📦 {{ p }} colli
</div>
{% endfor %}

</div>

<button class="btn" onclick="genera()">
Genera + Firma
</button>

</div>

<script>

function genera(){

    const telefono = "{{ telefono }}";
    const index = "{{ index }}";
    const tipo = "{{ tipo }}";

    // DEBUG (puoi rimuoverlo dopo)
    console.log("TEL:", telefono);
    console.log("INDEX:", index);
    console.log("TIPO:", tipo);

    window.location.href = "/firma/" + telefono + "?index=" + index + "&tipo=" + tipo;

}

</script>

</body>
</html>
