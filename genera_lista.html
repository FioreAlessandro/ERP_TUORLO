<!DOCTYPE html>
<html>
<head>
    <title>Generazione DDT</title>

    <style>
        body{
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            padding:40px;
            text-align:center;
        }

        .container{
            max-width:700px;
            margin:auto;
        }

        .card{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,0.6);
        }

        h1{
            margin-bottom:30px;
            font-size:28px;
        }

        .ddt-box{
            background:#0f172a;
            padding:20px;
            border-radius:15px;
            margin-bottom:40px;
            font-size:22px;
            font-weight:bold;
            letter-spacing:2px;
        }

        .btn{
            display:block;
            width:100%;
            padding:15px;
            margin:15px 0;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-primary{
            background:#10b981;
            color:white;
        }

        .btn-primary:hover{
            background:#059669;
            transform:scale(1.02);
        }

        .btn-disabled{
            background:#334155;
            color:#94a3b8;
            cursor:not-allowed;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Gestione DDT</h1>

        <div class="ddt-box">
            Ultimo DDT Generato:
            <div id="ultimo_ddt">---</div>
        </div>

        <button class="btn btn-primary" onclick="vaiGeneralista()">
            GENERA DDT CON LISTA
        </button>

        <button class="btn btn-disabled">
            GENERA DDT GDO
        </button>

        <button class="btn btn-disabled">
            GENERA DDT CLIENTE
        </button>

        <button class="btn btn-disabled">
            GENERA DDT SPEDIZIONE
        </button>

        <button class="btn btn-disabled">
            GENERA DDT UOVA SFUSE
        </button>

    </div>
</div>

<script>

    // ================= RECUPERA ULTIMO DDT =================
    fetch("/api/ultimo_ddt")
    .then(res => res.json())
    .then(data => {
        document.getElementById("ultimo_ddt").innerText = data.numero;
    });

    // ================= VAI A GENERALISTA =================
    function vaiGeneralista(){
        window.location.href = "/generalista";
    }

</script>

</body>
</html>
